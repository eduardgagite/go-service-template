version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unparam
    - unused
  exclusions:
    rules:
      # Test files intentionally ignore some return values, leave mock params unused,
      # and read response bodies without closing them.
      - path: _test\.go
        linters:
          - bodyclose
          - errcheck
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - go-service-template
