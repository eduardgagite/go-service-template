services:
  postgres:
    image: postgres:15.13-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-service_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-service_db}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.1
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command: [
      "-path", "/migrations",
      "-database", "postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-service_db}?sslmode=${DB_SSLMODE:-disable}",
      "up"
    ]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-service_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      DB_MAX_CONNS: ${DB_MAX_CONNS:-20}
      DB_MIN_CONNS: ${DB_MIN_CONNS:-2}
      DB_MAX_CONN_LIFETIME: ${DB_MAX_CONN_LIFETIME:-1h}
      DB_MAX_CONN_IDLE_TIME: ${DB_MAX_CONN_IDLE_TIME:-30m}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DEBUG_MODE: ${DEBUG_MODE:-false}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-true}

volumes:
  postgres_data: {}